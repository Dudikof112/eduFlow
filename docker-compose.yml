# Uruchomienie całego stacku jednym poleceniem: docker compose up --build
# Po starcie (raz) wypełnij dane demo:  docker compose exec backend npm run seed
# Frontend: http://localhost:5173   |   Backend (REST + socket.io): http://localhost:5000
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: elearning
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: P@ssw0rd
      DB_NAME: elearning
      MONGO_URI: mongodb://mongo:27017/elearning
      JWT_SECRET: super_secret_key_123
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      STRIPE_SECRET_KEY: sk_test_twoj_klucz_tajny
      STRIPE_WEBHOOK_SECRET: whsec_twoj_sekret_webhooka
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  mongodata:
